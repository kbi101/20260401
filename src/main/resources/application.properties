# PostgreSQL Persistence (Production)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:timelord}?currentSchema=${DB_SCHEMA:public}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}

# SQLite Persistence (Commented for fallback)
# spring.datasource.url=jdbc:sqlite:timelord.db?busy_timeout=5000
# spring.datasource.driver-class-name=org.sqlite.JDBC
# spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

spring.jpa.hibernate.ddl-auto=update

# Flyway for schema management
spring.flyway.enabled=true
spring.flyway.default-schema=${DB_SCHEMA:public}
spring.flyway.create-schemas=true

# Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:7b
spring.ai.ollama.chat.options.temperature=0.4
# 180 second timeout for slower local CPUs
spring.ai.ollama.chat.options.timeout=PT3M

# Logging
logging.level.com.timelord=DEBUG
logging.level.org.springframework.modulith=DEBUG

# Application
inbox.sync-rate-ms=3600000
