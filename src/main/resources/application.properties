# SQLite Persistence
spring.datasource.url=jdbc:sqlite:timelord.db?busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# Flyway for schema management
spring.flyway.enabled=true

# Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:7b
spring.ai.ollama.chat.options.temperature=0.4
# 180 second timeout for slower local CPUs
spring.ai.ollama.chat.options.timeout=PT3M

# Logging
logging.level.com.timelord=DEBUG
logging.level.org.springframework.modulith=DEBUG

# Application
inbox.sync-rate-ms=3600000
